version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "cXGNre3Xzn-dk0qD-66Aoli5C6XoEEhA-kceKh6_2Jo="
    AIRFLOW__WEBSERVER__SECRET_KEY: "TU_SECRET_KEY_LARGA_Y_FIJA"
  volumes:
    - ./:/opt/project
  networks:
    - lakehouse
  depends_on:
    postgres:
      condition: service_healthy

services:
  # -----------------------------------------
  # 1. ALMACENAMIENTO Y CATÁLOGO (Iceberg)
  # -----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: lakehouse
      POSTGRES_PASSWORD: lakehouse
      # Creamos múltiples bases de datos: una para Iceberg y otra para Airflow
      POSTGRES_DB: platform
      POSTGRES_MULTIPLE_DATABASES: "platform,airflow" 
    ports: ["5432:5432"]
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data
      # Script inicial para crear la DB de airflow si no existe
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse -d platform"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - ./runtime/minio:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123 2>/dev/null; do sleep 2; done;
      mc mb --ignore-existing local/lakehouse;
      "
    networks:
      - lakehouse

  # -----------------------------------------
  # 2. SISTEMA DE MENSAJERÍA (Kafka)
  # -----------------------------------------
 
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks: [lakehouse]

  # -----------------------------------------
  # 3. MOTOR DE PROCESAMIENTO (Spark)
  # -----------------------------------------
  spark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark
    volumes:
      - ./:/opt/project
    environment:
      ICEBERG_JDBC_URI: jdbc:postgresql://postgres:5432/platform
      ICEBERG_JDBC_USER: lakehouse
      ICEBERG_JDBC_PASSWORD: lakehouse
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
    depends_on: [postgres, minio, kafka]
    networks:
      - lakehouse
    command: tail -f /dev/null

  generator:
    image: python:3.11-slim
    container_name: generator
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    profiles: ["manual"]
    command: bash -c "pip install kafka-python-ng && python /opt/project/producer.py"
    networks:
      - lakehouse

  # -----------------------------------------
  # 4. GRAFOS (Neo4j)
  # -----------------------------------------
  neo4j:
    image: neo4j:5.12
    container_name: neo4j
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./runtime/neo4j/data:/data
    networks:
      - lakehouse

  # -----------------------------------------
  # 5. CONSULTA Y VISUALIZACIÓN (Trino + Superset)
  # -----------------------------------------
  trino:
    image: trinodb/trino:477
    container_name: trino
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["9080:8080"]
    volumes:
      # Asume que tienes tus catálogos configurados en esta ruta
      - ./config/trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse

  superset:
    image: apache/superset:latest
    build:
      context: .
      dockerfile: superset/Dockerfile
    container_name: superset
    ports: ["8088:8088"]
    environment:
      SUPERSET_SECRET_KEY: "tu_clave_secreta_superset"
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      ADDITIONAL_PIP_PACKAGES: "trino sqlalchemy-trino sqlalchemy==1.4.54"
    volumes:
      # Montamos el archivo de configuración y el de registro dentro del contenedor
      - ./superset/requirements.txt:/app/docker/requirements.txt
      - ./superset/superset_config.py:/app/pythonpath/superset_config.py
      - ./superset/register_trino.py:/app/pythonpath/register_trino.py
    command: ["/bin/sh", "-c", "/usr/bin/run-server.sh"]
    depends_on: [trino]
    networks:
      - lakehouse
  # -----------------------------------------
  # 6. ORQUESTACIÓN (Airflow)
  # -----------------------------------------
  
  airflow-init:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      _PIP_ADDITIONAL_REQUIREMENTS: ""
    entrypoint:
      - /bin/bash
      - -c
      - >
        airflow db migrate &&
        airflow users create --role Admin --username ${AIRFLOW_ADMIN_USER:-admin} --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} --firstname Airflow --lastname Admin --password ${AIRFLOW_ADMIN_PASSWORD:-admin} || true
    volumes:
      - ./:/opt/project
      - ./runtime/airflow:/opt/airflow
    networks:
      - lakehouse

  airflow-webserver:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_started
      trino:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__PARALLELISM: "4"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_CATALOG: lakehouse
      TRINO_SCHEMA: payments
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      PYTHONPATH: /opt/project
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
    command: airflow webserver
    ports:
      - "${AIRFLOW_PORT:-8081}:8080"
    volumes:
      - ./:/opt/project
      - ./runtime/airflow:/opt/airflow
    networks:
      - lakehouse

  airflow-scheduler:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      neo4j:
        condition: service_started
      trino:
        condition: service_started
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/project/airflow/dags
      AIRFLOW__CORE__PARALLELISM: "4"
      AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "2"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER:-lakehouse}:${POSTGRES_PASSWORD:-lakehouse}@postgres:5432/${POSTGRES_DB:-platform}
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      TRINO_HOST: trino
      TRINO_PORT: "8080"
      TRINO_CATALOG: lakehouse
      TRINO_SCHEMA: payments
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j_password}
      PYTHONPATH: /opt/project
    command: airflow scheduler
    volumes:
      - ./:/opt/project
      - ./runtime/airflow:/opt/airflow
    networks:
      - lakehouse
networks:
  lakehouse:
    driver: bridge