version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "cXGNre3Xzn-dk0qD-66Aoli5C6XoEEhA-kceKh6_2Jo="
    AIRFLOW__WEBSERVER__SECRET_KEY: "TU_SECRET_KEY_LARGA_Y_FIJA"
  volumes:
    - ./:/opt/project
  networks:
    - lakehouse
  depends_on:
    postgres:
      condition: service_healthy

services:
  # -----------------------------------------
  # 1. ALMACENAMIENTO Y CATÁLOGO (Iceberg)
  # -----------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: lakehouse
      POSTGRES_PASSWORD: lakehouse
      # Creamos múltiples bases de datos: una para Iceberg y otra para Airflow
      POSTGRES_DB: platform
      POSTGRES_MULTIPLE_DATABASES: "platform,airflow" 
    ports: ["5432:5432"]
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data
      # Script inicial para crear la DB de airflow si no existe
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lakehouse -d platform"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - ./runtime/minio:/data
    networks:
      - lakehouse

  minio-init:
    image: minio/mc:latest
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minio minio123 2>/dev/null; do sleep 2; done;
      mc mb --ignore-existing local/lakehouse;
      "
    networks:
      - lakehouse

  # -----------------------------------------
  # 2. SISTEMA DE MENSAJERÍA (Kafka)
  # -----------------------------------------
 
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://kafka:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks: [lakehouse]

  # -----------------------------------------
  # 3. MOTOR DE PROCESAMIENTO (Spark)
  # -----------------------------------------
  spark:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spark
    volumes:
      - ./:/opt/project
    environment:
      ICEBERG_JDBC_URI: jdbc:postgresql://postgres:5432/platform
      ICEBERG_JDBC_USER: lakehouse
      ICEBERG_JDBC_PASSWORD: lakehouse
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
    depends_on: [postgres, minio, kafka]
    networks:
      - lakehouse
    command: tail -f /dev/null

  generator:
    image: python:3.11-slim
    container_name: generator
    volumes:
      - ./:/opt/project
    working_dir: /opt/project
    profiles: ["manual"]
    command: bash -c "pip install kafka-python-ng && python /opt/project/producer.py"
    networks:
      - lakehouse

  # -----------------------------------------
  # 4. GRAFOS (Neo4j)
  # -----------------------------------------
  neo4j:
    image: neo4j:5.12
    container_name: neo4j
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/password123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - ./runtime/neo4j/data:/data
    networks:
      - lakehouse

  # -----------------------------------------
  # 5. CONSULTA Y VISUALIZACIÓN (Trino + Superset)
  # -----------------------------------------
  trino:
    image: trinodb/trino:477
    container_name: trino
    depends_on:
      postgres: {condition: service_healthy}
    ports: ["8080:8080"]
    volumes:
      # Asume que tienes tus catálogos configurados en esta ruta
      - ./config/trino/catalog:/etc/trino/catalog
    networks:
      - lakehouse

  superset:
    image: apache/superset:latest
    container_name: superset
    ports: ["8088:8088"]
    environment:
      SUPERSET_SECRET_KEY: "tu_clave_secreta_superset"
    depends_on: [trino]
    networks:
      - lakehouse

  # -----------------------------------------
  # 6. ORQUESTACIÓN (Airflow)
  # -----------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: bash -lc "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports: ["8081:8080"]
    command: webserver
    depends_on:
      airflow-init: {condition: service_completed_successfully}

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init: {condition: service_completed_successfully}

networks:
  lakehouse:
    driver: bridge