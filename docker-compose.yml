version: "3.8"

services:
  # 1. KAFKA (Zookeeper + Broker) para Parte 1 y 2
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on: [zookeeper]
    ports: ["9092:9092"]
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # 2. ALMACENAMIENTO (MinIO simulando S3 para Iceberg y Partes 8-10)
  minio:
    image: minio/minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data

  # 3. BASE DE DATOS RELACIONAL (Simulando RDS MySQL - Parte 9 y 10)
  mysql-rds:
    image: mysql:8.0
    ports: ["3306:3306"]
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fraud_db
    volumes:
      - ./data/mysql:/var/lib/mysql

  # 4. NEO4J (Para análisis de grafos - Parte 7)
  neo4j:
    image: neo4j:5.12
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/password123

# 5. AIRFLOW (Para orquestación de flujos de trabajo - Parte 6)
  airflow-db:
    image: postgres:15
    container_name: airflow-db
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  airflow-init:
    image: apache/airflow:2.9.3
    container_name: airflow-init
    depends_on:
      airflow-db:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "cXGNre3Xzn-dk0qD-66Aoli5C6XoEEhA-kceKh6_2Jo="
      AIRFLOW__WEBSERVER__SECRET_KEY: "TU_SECRET_KEY_LARGA_Y_FIJA"
      AIRFLOW__CORE__LOAD_EXAMPLES: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    command:
      bash -lc "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin --lastname User
        --role Admin
        --email admin@example.com"
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.3
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "cXGNre3Xzn-dk0qD-66Aoli5C6XoEEhA-kceKh6_2Jo="
      AIRFLOW__WEBSERVER__SECRET_KEY: "TU_SECRET_KEY_LARGA_Y_FIJA"      
      AIRFLOW__CORE__LOAD_EXAMPLES: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

    ports:
      - "8080:8080"
    command: webserver
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.9.3
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: "cXGNre3Xzn-dk0qD-66Aoli5C6XoEEhA-kceKh6_2Jo="
      AIRFLOW__WEBSERVER__SECRET_KEY: "TU_SECRET_KEY_LARGA_Y_FIJA"      
      AIRFLOW__CORE__LOAD_EXAMPLES: "true"
    command: scheduler
    restart: unless-stopped
